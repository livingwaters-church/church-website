<div class="dashboard-card">
    <h2>My Church Profile</h2>
    <form id="profile-form">
        <label>Full Name</label>
        <input type="text" name="name" value="Dean Thomas" disabled>

        <label>Phone Number</label>
        <input type="tel" name="phone" value="" placeholder="Enter phone..." 
               style="background-color: #fef08a; border: 2px solid #eab308;">

        <label>Email Address</label>
        <input type="email" name="email" value="" placeholder="Enter email..." 
               style="background-color: #fef08a; border: 2px solid #eab308;">

        <button type="submit" class="btn-update">Update My Info</button>
    </form>
</div>
